<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бизнес-приложение</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAqrvzxSxjGllPGkdzdRfW-I37VjLL7EQs",
            authDomain: "business-app-ef0c2.firebaseapp.com",
            projectId: "business-app-ef0c2",
            storageBucket: "business-app-ef0c2.firebasestorage.app",
            messagingSenderId: "588727180680",
            appId: "1:588727180680:web:8ccf0cb06a4901bf236e3d"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .app-container { max-width: 1200px; margin: 0 auto; }
        .main-screen { background: white; border-radius: 20px; padding: 40px; max-width: 600px; margin: 0 auto 30px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .main-photo-container { width: 200px; height: 200px; margin: 0 auto 20px; border-radius: 50%; overflow: hidden; background: #f0f0f0; display: flex; align-items: center; justify-content: center; position: relative; border: 3px solid #667eea; cursor: pointer; }
        .main-photo { width: 100%; height: 100%; object-fit: cover; }
        .photo-placeholder { font-size: 60px; color: #999; }
        .upload-photo-btn { position: absolute; bottom: 5px; right: 5px; background: #667eea; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; font-size: 20px; cursor: pointer; display: none; z-index: 10; }
        .business-name { color: #333; margin-bottom: 15px; font-size: 2.5em; animation: fadeInUp 0.8s ease-out; }
        .business-subtitle { color: #666; margin-bottom: 30px; font-size: 1.1em; animation: fadeInUp 0.8s ease-out 0.2s both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .btn-more, .btn-posts, .btn-questions { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; margin: 10px; transition: transform 0.3s; }
        .btn-more:hover, .btn-posts:hover, .btn-questions:hover { transform: translateY(-2px); }
        .admin-login-btn { background: transparent; border: 1px solid #ddd; color: #999; padding: 5px 15px; font-size: 12px; border-radius: 20px; cursor: pointer; margin-top: 15px; }
        .admin-panel-main { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; display: none; }
        .admin-panel-main button { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .detail-screen { display: none; background: white; border-radius: 20px; max-width: 900px; margin: 0 auto; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .posts-screen, .questions-screen { display: none; background: white; border-radius: 20px; padding: 30px; margin-top: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .posts-header, .questions-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .posts-header h2, .questions-header h2 { color: #333; font-size: 28px; }
        .question-form { background: #f8f9fa; padding: 25px; border-radius: 15px; margin-bottom: 40px; }
        .question-form h3 { margin-bottom: 20px; color: #333; }
        .question-form input, .question-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 16px; }
        .question-form textarea { min-height: 100px; resize: vertical; }
        .question-form button { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .message-card { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #667eea; }
        .message-name { font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .message-date { font-size: 12px; color: #999; margin-bottom: 10px; }
        .message-question-text { color: #333; margin-bottom: 15px; padding: 10px; background: white; border-radius: 10px; }
        .message-answer { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-top: 15px; }
        .message-answer-label { font-weight: bold; color: #2e7d32; margin-bottom: 8px; }
        .admin-buttons { margin-top: 15px; display: flex; gap: 10px; }
        .admin-buttons button { padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .admin-buttons .reply-btn { background: #667eea; color: white; }
        .admin-buttons .delete-btn { background: #dc3545; color: white; }
        .add-post-btn, .admin-toggle-btn { background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: none; }
        .post-card { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .post-date { color: #999; font-size: 12px; margin-bottom: 10px; }
        .post-title { color: #333; font-size: 20px; margin-bottom: 10px; }
        .post-content { color: #666; line-height: 1.5; margin-bottom: 15px; }
        .post-actions { display: none; gap: 10px; margin-top: 15px; }
        .post-actions button { background: #6c757d; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .post-actions button.delete-btn { background: #dc3545; }
        .post-actions button.edit-btn { background: #ffc107; color: #333; }
        .detail-content { padding: 30px; }
        .admin-panel-detail { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 25px; display: none; gap: 15px; flex-wrap: wrap; border: 1px solid #dee2e6; }
        .admin-panel-detail button { background: #6c757d; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .image-card { background: #f8f9fa; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; cursor: pointer; }
        .image-card img { width: 100%; height: 200px; object-fit: cover; }
        .delete-img-btn { position: absolute; top: 10px; right: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; display: none; z-index: 10; }
        .image-upload { text-align: center; padding: 15px; border: 2px dashed #dee2e6; border-radius: 10px; cursor: pointer; margin-bottom: 20px; display: none; }
        .image-upload label { cursor: pointer; display: inline-block; padding: 10px 20px; background: #667eea; color: white; border-radius: 5px; margin-top: 10px; }
        .description-area { margin-top: 20px; }
        .description-text { background: #f8f9fa; padding: 20px; border-radius: 10px; line-height: 1.6; color: #333; min-height: 200px; }
        .description-text[contenteditable="true"] { outline: 2px solid #28a745; background-color: #fff3cd; cursor: text; }
        .btn-back { background: #6c757d; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-size: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 350px; width: 90%; }
        .modal-content input { padding: 10px; font-size: 18px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; width: 150px; }
        .modal-content button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin: 5px; }
        .post-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000; }
        .post-modal-content { background: white; padding: 30px; border-radius: 20px; max-width: 500px; width: 90%; }
        .post-modal-content input, .post-modal-content textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .post-modal-content textarea { min-height: 150px; }
        .post-modal-content button { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-right: 10px; }
        .fullscreen-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 2000; cursor: pointer; }
        .fullscreen-modal img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 10px; }
        .fullscreen-modal .close-fullscreen { position: absolute; top: 20px; right: 40px; color: white; font-size: 40px; cursor: pointer; }
        .view-mode-badge { position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; z-index: 999; }
        @media (max-width: 768px) { .main-screen, .detail-screen, .posts-screen, .questions-screen { margin: 10px; } .gallery { grid-template-columns: 1fr; } .main-photo-container { width: 150px; height: 150px; } .posts-header, .questions-header { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="view-mode-badge" id="modeBadge">👁️ Режим просмотра</div>

        <div id="passwordModal" class="modal">
            <div class="modal-content">
                <h3>🔐 Вход для администратора</h3>
                <p>Введите пароль для редактирования</p>
                <input type="password" id="adminPasswordInput" maxlength="6" placeholder="******">
                <br>
                <button onclick="checkAdminPassword()">Войти</button>
                <button onclick="closePasswordModal()">Отмена</button>
            </div>
        </div>

        <div id="fullscreenModal" class="fullscreen-modal" onclick="closeFullscreen()">
            <span class="close-fullscreen">&times;</span>
            <img id="fullscreenImage" src="">
        </div>

        <div id="postModal" class="post-modal">
            <div class="post-modal-content">
                <h3 id="postModalTitle">➕ Добавить пост</h3>
                <input type="text" id="postTitle" placeholder="Заголовок поста">
                <textarea id="postContent" placeholder="Текст поста..."></textarea>
                <button onclick="savePost()">Сохранить</button>
                <button class="cancel" onclick="closePostModal()">Отмена</button>
            </div>
        </div>

        <div id="mainScreen" class="main-screen">
            <div class="main-photo-container" id="mainPhotoContainer" onclick="openMainPhotoFullscreen()">
                <img id="mainPhoto" class="main-photo" style="display: none;">
                <div id="photoPlaceholder" class="photo-placeholder">📷</div>
                <button class="upload-photo-btn" id="uploadMainPhotoBtn" onclick="event.stopPropagation(); triggerMainPhotoUpload()">+</button>
            </div>
            <h1 class="business-name" id="mainTitle">Загрузка...</h1>
            <div class="business-subtitle" id="mainSubtitle">Загрузка...</div>
            <button class="btn-more" onclick="showDetailScreen()">Узнать больше</button>
            <button class="btn-posts" onclick="showPostsScreen()">📰 Новости и статьи</button>
            <button class="btn-questions" onclick="showQuestionsScreen()">💬 Задать вопрос</button>
            <br>
            <button class="admin-login-btn" onclick="showPasswordModal('login')">🔑 Вход для администратора</button>
            <div id="adminPanelMain" class="admin-panel-main">
                <button onclick="editMainScreenText()">✏️ Изменить название и описание</button>
            </div>
        </div>

        <div id="detailScreen" class="detail-screen">
            <div class="detail-content">
                <button class="btn-back" onclick="hideDetailScreen()">← Назад</button>
                <div id="adminPanelDetail" class="admin-panel-detail">
                    <button onclick="enableTextEditing()">✏️ Редактировать текст</button>
                    <button onclick="saveTextChanges()">💾 Сохранить текст</button>
                    <button onclick="changeTextBgColor()">🎨 Сменить фон текста</button>
                </div>
                <h3>Галерея</h3>
                <div class="gallery" id="gallery"></div>
                <div id="imageUploadArea" class="image-upload" onclick="triggerImageUpload()">
                    <div>📷 Нажмите или перетащите изображения</div>
                    <label>Выбрать изображения</label>
                </div>
                <div class="description-area">
                    <h3>Описание</h3>
                    <div class="description-text" id="descriptionText">Загрузка...</div>
                </div>
            </div>
        </div>

        <div id="postsScreen" class="posts-screen">
            <button class="btn-back" onclick="hidePostsScreen()">← Назад</button>
            <div class="posts-header">
                <h2>📰 Новости и статьи</h2>
                <button id="addPostBtn" class="add-post-btn" onclick="openAddPostModal()">➕ Добавить пост</button>
            </div>
            <div id="postsList"></div>
        </div>

        <div id="questionsScreen" class="questions-screen">
            <button class="btn-back" onclick="hideQuestionsScreen()">← Назад</button>
            <div class="questions-header">
                <h2>💬 Вопросы и ответы</h2>
                <button id="adminToggleBtn" class="admin-toggle-btn" onclick="toggleAdminPanel()">🔧 Управление сообщениями</button>
            </div>
            <div class="question-form" id="askForm">
                <h3>📝 Задать вопрос</h3>
                <input type="text" id="visitorName" placeholder="Ваше имя" maxlength="50">
                <textarea id="visitorQuestion" placeholder="Ваш вопрос..."></textarea>
                <button onclick="sendQuestion()">📨 Отправить вопрос</button>
            </div>
            <h3>💬 Вопросы посетителей</h3>
            <div id="messagesList"></div>
        </div>
    </div>

    <script type="module">
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAqrvzxSxjGllPGkdzdRfW-I37VjLL7EQs",
            authDomain: "business-app-ef0c2.firebaseapp.com",
            projectId: "business-app-ef0c2",
            storageBucket: "business-app-ef0c2.firebasestorage.app",
            messagingSenderId: "588727180680",
            appId: "1:588727180680:web:8ccf0cb06a4901bf236e3d"
        };
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const ADMIN_PASSWORD = "467211";
        let isAdmin = false;
        let isAdminPanelVisible = false;
        let images = [];
        let posts = [];
        let messages = [];
        let editingPostId = null;
        let isTextEditingEnabled = false;

        // ============ ВОПРОСЫ И ОТВЕТЫ ============
        async function loadMessages() {
            try {
                const querySnapshot = await getDocs(collection(db, "messages"));
                messages = [];
                querySnapshot.forEach((doc) => {
                    messages.push({ id: doc.id, ...doc.data() });
                });
                messages.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderMessages();
            } catch (error) {
                console.error("Ошибка загрузки сообщений:", error);
            }
        }

        function renderMessages() {
            const container = document.getElementById('messagesList');
            if (!container) return;
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">Пока нет вопросов. Будьте первым!</div>';
                return;
            }
            
            container.innerHTML = '';
            messages.forEach(msg => {
                const messageCard = document.createElement('div');
                messageCard.className = 'message-card';
                messageCard.innerHTML = `
                    <div class="message-name">👤 ${escapeHtml(msg.name)}</div>
                    <div class="message-date">📅 ${msg.date}</div>
                    <div class="message-question-text">❓ ${escapeHtml(msg.question)}</div>
                    ${msg.answer ? `<div class="message-answer"><div class="message-answer-label">✅ Ответ администратора:</div>${escapeHtml(msg.answer)}</div>` : '<div class="message-answer" style="background:#fff3cd;"><div class="message-answer-label">⏳ Ожидает ответа...</div></div>'}
                    ${isAdmin && isAdminPanelVisible ? `
                        <div class="admin-buttons">
                            <button class="reply-btn" onclick="showReplyPrompt('${msg.id}')">✏️ Ответить</button>
                            <button class="delete-btn" onclick="deleteMessage('${msg.id}')">🗑️ Удалить</button>
                        </div>
                    ` : ''}
                `;
                container.appendChild(messageCard);
            });
        }

        function toggleAdminPanel() {
            if (!isAdmin) {
                showPasswordModal('adminPanel');
                return;
            }
            isAdminPanelVisible = !isAdminPanelVisible;
            const btn = document.getElementById('adminToggleBtn');
            if (isAdminPanelVisible) {
                btn.innerHTML = '🔒 Скрыть управление';
                btn.style.background = 'linear-gradient(135deg, #dc3545 0%, #c82333 100%)';
            } else {
                btn.innerHTML = '🔧 Управление сообщениями';
                btn.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
            }
            renderMessages();
        }

        async function showReplyPrompt(messageId) {
            const message = messages.find(m => m.id === messageId);
            if (!message) return;
            const answer = prompt('Введите ответ на вопрос:', message.answer || '');
            if (answer !== null && answer.trim() !== '') {
                try {
                    const messageRef = doc(db, "messages", messageId);
                    await updateDoc(messageRef, { answer: answer.trim() });
                    await loadMessages();
                    alert('Ответ сохранён!');
                } catch (error) {
                    console.error("Ошибка сохранения ответа:", error);
                    alert('Ошибка сохранения ответа');
                }
            }
        }

        async function deleteMessage(messageId) {
            if (confirm('Удалить это сообщение навсегда?')) {
                try {
                    await deleteDoc(doc(db, "messages", messageId));
                    await loadMessages();
                    alert('Сообщение удалено!');
                } catch (error) {
                    console.error("Ошибка удаления:", error);
                    alert('Ошибка удаления');
                }
            }
        }

        async function sendQuestion() {
            const name = document.getElementById('visitorName').value.trim();
            const question = document.getElementById('visitorQuestion').value.trim();
            if (!name || !question) {
                alert('Заполните имя и вопрос!');
                return;
            }
            const date = new Date().toISOString().split('T')[0];
            try {
                await addDoc(collection(db, "messages"), { name, question, answer: "", date });
                document.getElementById('visitorName').value = '';
                document.getElementById('visitorQuestion').value = '';
                await loadMessages();
                alert('Вопрос отправлен! Администратор ответит в ближайшее время.');
            } catch (error) {
                console.error("Ошибка отправки вопроса:", error);
                alert('Ошибка отправки вопроса');
            }
        }

        function showQuestionsScreen() {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('detailScreen').style.display = 'none';
            document.getElementById('postsScreen').style.display = 'none';
            document.getElementById('questionsScreen').style.display = 'block';
            isAdminPanelVisible = false;
            const btn = document.getElementById('adminToggleBtn');
            if (btn) {
                btn.innerHTML = '🔧 Управление сообщениями';
                btn.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
                btn.style.display = isAdmin ? 'block' : 'none';
            }
            loadMessages();
        }

        function hideQuestionsScreen() {
            document.getElementById('questionsScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        }

        // ============ ПОСТЫ ============
        async function loadPosts() {
            try {
                const querySnapshot = await getDocs(collection(db, "posts"));
                posts = [];
                querySnapshot.forEach((doc) => { posts.push({ id: doc.id, ...doc.data() }); });
                posts.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderPosts();
            } catch (error) { console.error("Ошибка загрузки постов:", error); }
        }

        function renderPosts() {
            const container = document.getElementById('postsList');
            if (!container) return;
            if (posts.length === 0) { container.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">Пока нет постов. Добавьте первый!</div>'; return; }
            container.innerHTML = '';
            posts.forEach(post => {
                const postCard = document.createElement('div');
                postCard.className = 'post-card';
                postCard.innerHTML = `
                    <div class="post-date">📅 ${post.date}</div>
                    <h3 class="post-title">${escapeHtml(post.title)}</h3>
                    <div class="post-content">${escapeHtml(post.content)}</div>
                    <div class="post-actions" id="post-actions-${post.id}">
                        <button class="edit-btn" onclick="openEditPostModal('${post.id}')">✏️ Редактировать</button>
                        <button class="delete-btn" onclick="deletePost('${post.id}')">🗑️ Удалить</button>
                    </div>
                `;
                container.appendChild(postCard);
                if (isAdmin) { const actionsDiv = document.getElementById(`post-actions-${post.id}`); if (actionsDiv) actionsDiv.style.display = 'flex'; }
            });
        }

        async function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            if (!title || !content) { alert('Заполните заголовок и текст поста!'); return; }
            const date = new Date().toISOString().split('T')[0];
            try {
                if (editingPostId) { const postRef = doc(db, "posts", editingPostId); await updateDoc(postRef, { title, content, date }); }
                else { await addDoc(collection(db, "posts"), { title, content, date }); }
                await loadPosts(); closePostModal(); alert(editingPostId ? 'Пост обновлён!' : 'Пост добавлен!');
            } catch (error) { console.error("Ошибка сохранения поста:", error); alert('Ошибка сохранения поста'); }
        }

        async function deletePost(postId) {
            if (confirm('Удалить этот пост?')) {
                try { await deleteDoc(doc(db, "posts", postId)); await loadPosts(); alert('Пост удалён!'); }
                catch (error) { console.error("Ошибка удаления поста:", error); alert('Ошибка удаления поста'); }
            }
        }

        function openAddPostModal() {
            if (!isAdmin) { showPasswordModal('addPost'); return; }
            editingPostId = null; document.getElementById('postModalTitle').innerText = '➕ Добавить пост';
            document.getElementById('postTitle').value = ''; document.getElementById('postContent').value = '';
            document.getElementById('postModal').style.display = 'flex';
        }

        function openEditPostModal(postId) {
            if (!isAdmin) return;
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            editingPostId = postId; document.getElementById('postModalTitle').innerText = '✏️ Редактировать пост';
            document.getElementById('postTitle').value = post.title; document.getElementById('postContent').value = post.content;
            document.getElementById('postModal').style.display = 'flex';
        }

        function closePostModal() { document.getElementById('postModal').style.display = 'none'; editingPostId = null; }

        function showPostsScreen() {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('detailScreen').style.display = 'none';
            document.getElementById('questionsScreen').style.display = 'none';
            document.getElementById('postsScreen').style.display = 'block';
            loadPosts();
            const addBtn = document.getElementById('addPostBtn');
            if (addBtn) addBtn.style.display = isAdmin ? 'block' : 'none';
        }

        function hidePostsScreen() {
            document.getElementById('postsScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        }

        // ============ ОСТАЛЬНЫЕ ФУНКЦИИ ============
        async function saveToFirebase(dataType, value) {
            if (!isAdmin) return;
            try { const docRef = doc(db, "businessData", "main"); await setDoc(docRef, { [dataType]: value }, { merge: true }); alert("Изменения сохранены и видны всем!"); }
            catch (error) { console.error("Ошибка сохранения:", error); }
        }

        async function saveImagesToFirebase(imagesArray) {
            if (!isAdmin) return;
            try { const docRef = doc(db, "businessData", "main"); await setDoc(docRef, { galleryImages: imagesArray }, { merge: true }); }
            catch (error) { console.error("Ошибка сохранения галереи:", error); }
        }

        async function saveDescriptionBgColorToFirebase(color) {
            if (!isAdmin) return;
            try { const docRef = doc(db, "businessData", "main"); await setDoc(docRef, { descriptionBgColor: color }, { merge: true }); }
            catch (error) { console.error("Ошибка сохранения цвета фона:", error); }
        }

        async function loadFromFirebase() {
            try {
                const docRef = doc(db, "businessData", "main");
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.mainTitle) document.getElementById('mainTitle').innerText = data.mainTitle;
                    if (data.mainSubtitle) document.getElementById('mainSubtitle').innerText = data.mainSubtitle;
                    if (data.mainPhoto) { document.getElementById('mainPhoto').src = data.mainPhoto; document.getElementById('mainPhoto').style.display = 'block'; document.getElementById('photoPlaceholder').style.display = 'none'; }
                    if (data.businessDescription) document.getElementById('descriptionText').innerHTML = data.businessDescription;
                    if (data.descriptionBgColor) document.getElementById('descriptionText').style.backgroundColor = data.descriptionBgColor;
                    if (data.galleryImages && Array.isArray(data.galleryImages)) { images = data.galleryImages; renderGallery(); }
                } else {
                    document.getElementById('mainTitle').innerText = "Название бизнеса";
                    document.getElementById('mainSubtitle').innerText = "Описание бизнеса";
                    document.getElementById('descriptionText').innerHTML = "Здесь будет ваше описание. Войдите как администратор, чтобы изменить текст.";
                }
            } catch (error) { console.error("Ошибка загрузки из Firebase:", error); }
        }

        function openFullscreen(imageUrl) { document.getElementById('fullscreenImage').src = imageUrl; document.getElementById('fullscreenModal').style.display = 'flex'; }
        function closeFullscreen() { document.getElementById('fullscreenModal').style.display = 'none'; }
        function openMainPhotoFullscreen() { const img = document.getElementById('mainPhoto'); if (img.style.display === 'block' && img.src) openFullscreen(img.src); }

        function showPasswordModal(action) { pendingAction = action; document.getElementById('passwordModal').style.display = 'flex'; document.getElementById('adminPasswordInput').value = ''; }
        function closePasswordModal() { document.getElementById('passwordModal').style.display = 'none'; pendingAction = null; }
        let pendingAction = null;

        async function checkAdminPassword() {
            const password = document.getElementById('adminPasswordInput').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true; closePasswordModal(); enableAdminMode();
                if (pendingAction === 'photo') setTimeout(() => mainPhotoInput.click(), 100);
                else if (pendingAction === 'editMain') editMainScreenText();
                else if (pendingAction === 'uploadImage') setTimeout(() => galleryImageInput.click(), 100);
                else if (pendingAction === 'addPost') openAddPostModal();
                else if (pendingAction === 'adminPanel') toggleAdminPanel();
                pendingAction = null;
            } else { alert('Неверный пароль!'); document.getElementById('adminPasswordInput').value = ''; }
        }

        function enableAdminMode() {
            document.getElementById('modeBadge').innerHTML = '👑 Режим администратора';
            document.getElementById('modeBadge').style.background = 'rgba(40,167,69,0.9)';
            document.getElementById('uploadMainPhotoBtn').style.display = 'flex';
            document.getElementById('adminPanelMain').style.display = 'block';
            document.getElementById('adminPanelDetail').style.display = 'flex';
            document.getElementById('imageUploadArea').style.display = 'block';
            document.getElementById('addPostBtn').style.display = 'block';
            document.getElementById('adminToggleBtn').style.display = 'block';
            document.querySelectorAll('.delete-img-btn').forEach(btn => btn.style.display = 'block');
            document.querySelectorAll('.post-actions').forEach(actions => actions.style.display = 'flex');
        }

        const mainPhotoInput = document.createElement('input');
        mainPhotoInput.type = 'file'; mainPhotoInput.accept = 'image/*'; mainPhotoInput.style.display = 'none';
        mainPhotoInput.onchange = async (event) => {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    document.getElementById('mainPhoto').src = e.target.result;
                    document.getElementById('mainPhoto').style.display = 'block';
                    document.getElementById('photoPlaceholder').style.display = 'none';
                    await saveToFirebase('mainPhoto', e.target.result);
                };
                reader.readAsDataURL(file);
            }
            mainPhotoInput.value = '';
        };
        document.body.appendChild(mainPhotoInput);
        function triggerMainPhotoUpload() { if (!isAdmin) showPasswordModal('photo'); else mainPhotoInput.click(); }

        async function editMainScreenText() {
            if (!isAdmin) { showPasswordModal('editMain'); return; }
            const newTitle = prompt('Введите новое название бизнеса:', document.getElementById('mainTitle').innerText);
            const newSubtitle = prompt('Введите новое описание:', document.getElementById('mainSubtitle').innerText);
            if (newTitle && newTitle.trim()) { document.getElementById('mainTitle').innerText = newTitle; await saveToFirebase('mainTitle', newTitle); }
            if (newSubtitle && newSubtitle.trim()) { document.getElementById('mainSubtitle').innerText = newSubtitle; await saveToFirebase('mainSubtitle', newSubtitle); }
        }

        function showDetailScreen() {
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('postsScreen').style.display = 'none';
            document.getElementById('questionsScreen').style.display = 'none';
            document.getElementById('detailScreen').style.display = 'block';
            renderGallery();
            if (isAdmin) document.querySelectorAll('.delete-img-btn').forEach(btn => btn.style.display = 'block');
        }

        function hideDetailScreen() {
            document.getElementById('detailScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            isTextEditingEnabled = false;
        }

        function enableTextEditing() {
            if (!isAdmin) { showPasswordModal('editText'); return; }
            isTextEditingEnabled = true;
            const div = document.getElementById('descriptionText');
            div.contentEditable = "true";
            div.style.backgroundColor = "#fff3cd";
            div.style.border = "2px solid #ffc107";
            alert('Редактирование текста включено!');
        }

        async function saveTextChanges() {
            if (!isTextEditingEnabled) { alert('Сначала включите режим редактирования!'); return; }
            const newText = document.getElementById('descriptionText').innerHTML;
            await saveToFirebase('businessDescription', newText);
            const div = document.getElementById('descriptionText');
            div.contentEditable = "false";
            div.style.backgroundColor = "";
            div.style.border = "none";
            isTextEditingEnabled = false;
        }

        async function changeTextBgColor() {
            if (!isAdmin) { showPasswordModal('changeColor'); return; }
            const color = prompt('Введите цвет фона (например: lightblue, #f0f0f0, yellow):', '#f8f9fa');
            if (color) { document.getElementById('descriptionText').style.backgroundColor = color; await saveDescriptionBgColorToFirebase(color); }
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            if (!gallery) return;
            gallery.innerHTML = '';
            if (images.length === 0) { gallery.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">Пока нет изображений. Загрузите первые фото!</div>'; return; }
            images.forEach((image, index) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.onclick = () => openFullscreen(image.url);
                card.innerHTML = `<img src="${image.url}"><button class="delete-img-btn" onclick="event.stopPropagation(); deleteImage(${index})">🗑️ Удалить</button>`;
                gallery.appendChild(card);
            });
            if (isAdmin) document.querySelectorAll('.delete-img-btn').forEach(btn => btn.style.display = 'block');
        }

        const galleryImageInput = document.createElement('input');
        galleryImageInput.type = 'file'; galleryImageInput.accept = 'image/*'; galleryImageInput.multiple = true; galleryImageInput.style.display = 'none';
        galleryImageInput.onchange = async (event) => {
            if (!isAdmin) return;
            const files = Array.from(event.target.files);
            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    await new Promise((resolve) => {
                        reader.onload = async function(e) {
                            images.push({ url: e.target.result, name: file.name });
                            await saveImagesToFirebase(images);
                            renderGallery();
                            resolve();
                        };
                        reader.readAsDataURL(file);
                    });
                }
            }
            galleryImageInput.value = '';
            alert('Фото загружены!');
        };
        document.body.appendChild(galleryImageInput);
        function triggerImageUpload() { if (!isAdmin) showPasswordModal('uploadImage'); else galleryImageInput.click(); }
        async function deleteImage(index) { if (!isAdmin) { showPasswordModal('deleteImage'); return; } images.splice(index, 1); await saveImagesToFirebase(images); renderGallery(); }

        function setupDragAndDrop() {
            const area = document.getElementById('imageUploadArea');
            if (!area) return;
            area.addEventListener('dragover', (e) => { e.preventDefault(); area.style.borderColor = '#667eea'; area.style.backgroundColor = '#f8f9fa'; });
            area.addEventListener('dragleave', (e) => { e.preventDefault(); area.style.borderColor = '#dee2e6'; area.style.backgroundColor = 'transparent'; });
            area.addEventListener('drop', async (e) => {
                e.preventDefault(); area.style.borderColor = '#dee2e6'; area.style.backgroundColor = 'transparent';
                if (!isAdmin) { showPasswordModal('uploadImage'); return; }
                const files = Array.from(e.dataTransfer.files);
                const imageFiles = files.filter(f => f.type.startsWith('image/'));
                for (const file of imageFiles) {
                    const reader = new FileReader();
                    await new Promise((resolve) => {
                        reader.onload = async function(e) {
                            images.push({ url: e.target.result, name: file.name });
                            await saveImagesToFirebase(images);
                            renderGallery();
                            resolve();
                        };
                        reader.readAsDataURL(file);
                    });
                }
                alert('Фото загружены!');
            });
        }

        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

        async function init() {
            await loadFromFirebase();
            await loadPosts();
            await loadMessages();
            setupDragAndDrop();
            renderGallery();
        }

        window.checkAdminPassword = checkAdminPassword;
        window.closePasswordModal = closePasswordModal;
        window.showPasswordModal = showPasswordModal;
        window.triggerMainPhotoUpload = triggerMainPhotoUpload;
        window.editMainScreenText = editMainScreenText;
        window.showDetailScreen = showDetailScreen;
        window.hideDetailScreen = hideDetailScreen;
        window.showPostsScreen = showPostsScreen;
        window.hidePostsScreen = hidePostsScreen;
        window.showQuestionsScreen = showQuestionsScreen;
        window.hideQuestionsScreen = hideQuestionsScreen;
        window.enableTextEditing = enableTextEditing;
        window.saveTextChanges = saveTextChanges;
        window.changeTextBgColor = changeTextBgColor;
        window.deleteImage = deleteImage;
        window.triggerImageUpload = triggerImageUpload;
        window.openMainPhotoFullscreen = openMainPhotoFullscreen;
        window.closeFullscreen = closeFullscreen;
        window.openAddPostModal = openAddPostModal;
        window.openEditPostModal = openEditPostModal;
        window.deletePost = deletePost;
        window.savePost = savePost;
        window.closePostModal = closePostModal;
        window.sendQuestion = sendQuestion;
        window.deleteMessage = deleteMessage;
        window.showReplyPrompt = showReplyPrompt;
        window.toggleAdminPanel = toggleAdminPanel;

        init();
    </script>
</body>
</html>
